name: Build HandsFree Control APK

# Trigger: runs whenever you push code, or manually from GitHub Actions tab
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest  # GitHub provides free x86_64 Linux runners

    steps:
      # ── 1. Check out the code ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Download MediaPipe hand landmark model ──
      - name: Download MediaPipe hand_landmarker model
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/hand_landmarker.task \
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task"
          echo "Model file size: $(du -h app/src/main/assets/hand_landmarker.task)"

      # ── 4. Cache Gradle dependencies ──
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Grant execute permission to Gradle wrapper ──
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 6. Build the debug APK ──
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.parallel=true"

      # ── 7. Upload APK as downloadable artifact ──
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandsFreeControl-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30  # Keep APK available for 30 days

      # ── 8. Print success info ──
      - name: Build summary
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          SIZE=$(du -h "$APK" | cut -f1)
          echo "✅ APK built successfully!"
          echo "📦 File: $APK"
          echo "📏 Size: $SIZE"
          echo ""
          echo "Download the APK from the 'Artifacts' section of this workflow run."
